<script>
// ============= QUESTION DATA =============
const QUESTIONS = [
  // ---- Chapter 1 ----
  { id:"Q1.1", ch:"1", diff:"E", type:"MCQ",
    prompt: "Which of the following is NOT one of the three core elements of IoT?",
    options: ["Things","Connectivity","Sense-making","Virtualization"],
    correct: [3],
    explain: "The three core elements are Things, Connectivity, and Sense-making. Virtualization is not one of them." },

  { id:"Q1.2", ch:"1", diff:"E", type:"T/F",
    prompt: "An IoT system where devices only communicate with each other locally, without using the Internet, should still be called an <em>Internet</em> of Things.",
    options: ["True","False"],
    correct: [1],
    explain: "False. Without Internet connectivity it's an <strong>Intranet</strong> of Things." },

  { id:"Q1.3", ch:"1", diff:"M", type:"MRQ",
    prompt: "Which of the following are typical IoT benefits? <em>(Select all that apply)</em>",
    options: ["Predictive insights from historical data","Automatic elimination of network latency","Continuous automated security monitoring","Zero-power operation regardless of hardware","Faster restocking and customer service"],
    correct: [0,2,4],
    explain: "IoT enables predictive insights, automated monitoring, and customer-service improvements. It doesn't eliminate latency or remove power constraints." },

  { id:"Q1.4", ch:"1", diff:"E", type:"FIB",
    prompt: "IoT data is often ______ data — data points paired with timestamps.",
    answer: "time-series",
    explain: "Time-series data. Sensor readings are almost always timestamped for ordering, trend analysis, and replay." },

  { id:"Q1.5", ch:"1", diff:"M", type:"SA",
    prompt: "Explain in 2–3 sentences <em>why</em> IoT only became commercially viable in the last ~15 years, referencing hardware trends.",
    answer: "Computing chips became small and cheap enough to embed in ordinary objects (toothbrushes, fridges, etc.). This miniaturization + falling cost, plus ubiquitous wireless networks, made it commercially viable to connect everyday things to the internet." },

  { id:"Q1.6", ch:"1", diff:"M", type:"SA",
    prompt: "Give one example each of how IoT is applied in: (a) connected cars, (b) smart cities, (c) industrial IoT.",
    answer: "(a) Dashcams, fuel monitoring, accident alerts, breakdown prediction. (b) Air-quality monitoring, smart street lighting, parking management. (c) Predictive maintenance in factories, wearable safety devices, supply-chain tracking." },

  // ---- Chapter 2 ----
  { id:"Q2.1", ch:"2", diff:"E", type:"MCQ",
    prompt: "A \"thing\" in IoT is best defined as:",
    options: ["Any internet-connected computer","A physical object augmented with an embedded device that monitors it","A sensor wired to a microcontroller","Any object that has a QR code sticker"],
    correct: [1],
    explain: "Thing = physical object + embedded device monitoring it. The embedded device provides sensing, control, computation, networking." },

  { id:"Q2.2", ch:"2", diff:"E", type:"MATCH",
    prompt: "Match each sensor type to an example:",
    pairs: [
      {left:"1. Environmental", right:"C. Light sensor"},
      {left:"2. Position", right:"D. Accelerometer"},
      {left:"3. Vision", right:"B. LIDAR"},
      {left:"4. Chemical", right:"E. Gas sensor"},
      {left:"5. Acoustic", right:"A. Microphone"}
    ],
    explain: "Environmental→light/temp, Position→GPS/accelerometer, Vision→camera/LIDAR, Chemical→gas/bio, Acoustic→microphone." },

  { id:"Q2.3", ch:"2", diff:"M", type:"ORDER",
    prompt: "Put the steps of sensor selection in the correct order:",
    items: [
      "Identify what contextual information you need to sense",
      "Decide which sensor modality can detect that context",
      "Check sensor specifications (range, accuracy, periodic vs event-driven)",
      "Consider budget, compliance, lead time, maintenance"
    ],
    explain: "(1) Context → (2) Modality → (3) Specs → (4) Other considerations. Always start from what you need to sense, not from the sensor catalog." },

  { id:"Q2.4", ch:"2", diff:"M", type:"MCQ",
    prompt: "A retail store wants to push promotions to customers' phones as they walk past specific aisles. Which beacon configuration fits best?",
    options: ["Fixed Beacons, Mobile Receivers","Mobile Beacons, Fixed Receivers","Mobile Beacons, Mobile Receivers","Fixed Beacons, Fixed Receivers"],
    correct: [0],
    explain: "Beacons stay fixed in the aisles; customers' phones (mobile receivers) pick up the signal and trigger the promo." },

  { id:"Q2.5", ch:"2", diff:"M", type:"SA",
    prompt: "Explain what RSSI is and how it enables proximity estimation with BLE beacons.",
    answer: "RSSI (Received Signal Strength Indicator) is the measured power of a received signal. Because signal strength decreases with distance from the transmitter, a receiver can use RSSI as a rough estimate of how far away the beacon is." },

  { id:"Q2.6", ch:"2", diff:"H", type:"MRQ",
    prompt: "Which statements about passive RFID vs BLE are correct?",
    options: [
      "Passive RFID has lower power consumption than BLE",
      "BLE supports two-way communication; passive RFID does not",
      "BLE can do continuous scanning; passive RFID cannot",
      "Passive RFID has larger storage capacity than active RFID",
      "Both are considered cost-effective"
    ],
    correct: [1,2,3,4],
    explain: "Both are \"Low\" power — neither clearly lower (A false). BLE has two-way and continuous scanning (B, C true). Passive RFID 4–8 KB > Active 2 KB (D true). Both cost-effective (E true)." },

  { id:"Q2.7", ch:"2", diff:"E", type:"FIB",
    prompt: "GPS provides ______-time tracking but is NOT considered cost-effective compared to BLE or RFID.",
    answer: "real",
    explain: "Real-time tracking. GPS gives live location but is power-hungry and expensive." },

  { id:"Q2.8", ch:"2", diff:"H", type:"SA",
    prompt: "A museum wants visitors to automatically receive exhibit information on their phones as they walk near each exhibit. Compare BLE beacons vs QR codes for this use case — pick one and justify with at least three specific criteria.",
    answer: "BLE beacons win. (1) Passive for the visitor — no scanning action required; (2) ranging/proximity detects closeness automatically; (3) low power means beacons run on coin cells for years; (4) two-way communication allows interactive content. QR requires the visitor to take out their phone and frame each code." },

  // ---- Chapter 3 ----
  { id:"Q3.1", ch:"3", diff:"E", type:"ORDER",
    prompt: "Order the TCP/IP layers from top (application) to bottom (physical):",
    items: ["Application","Transport","Network","Link","Physical"],
    explain: "Application → Transport → Network → Link → Physical. Each layer only talks to the one directly above/below it." },

  { id:"Q3.2", ch:"3", diff:"E", type:"MCQ",
    prompt: "Which layer is responsible for assigning addresses and routing packets across networks?",
    options: ["Application","Transport","Network","Link"],
    correct: [2],
    explain: "The Network layer (IP) handles addressing and routing across networks. Transport delivers to processes; Link handles a single hop." },

  { id:"Q3.3", ch:"3", diff:"M", type:"MATCH",
    prompt: "Match each HTTP method to its REST purpose:",
    pairs: [
      {left:"1. GET", right:"B. Retrieve data"},
      {left:"2. POST", right:"A. Create new data"},
      {left:"3. PUT", right:"D. Update existing data"},
      {left:"4. DELETE", right:"C. Remove data"}
    ],
    explain: "GET=read, POST=create, PUT=update, DELETE=delete." },

  { id:"Q3.4", ch:"3", diff:"M", type:"T/F",
    prompt: "HTTP is stateful — the server remembers each client's previous requests automatically.",
    options: ["True","False"],
    correct: [1],
    explain: "False. HTTP is stateless. Session state must be explicitly carried (e.g., cookies, tokens)." },

  { id:"Q3.5", ch:"3", diff:"M", type:"SA",
    prompt: "Explain what \"packetization\" means and why it's important for networks.",
    answer: "Packetization splits data into small packets, each with headers (metadata like destination address) and payload (actual content). It enables routing through different paths, retransmission of only lost packets, and multiplexing of many flows over one link." },

  { id:"Q3.6", ch:"3", diff:"H", type:"SA",
    prompt: "Give one reason HTTP REST is a poor fit for battery-powered sensors sending small updates every few seconds.",
    answer: "High per-request overhead: verbose text headers, TCP handshake setup/teardown per call, and stateless re-authentication. Over time this consumes far more energy and bandwidth than MQTT's persistent connection with compact binary messages." },

  // ---- Chapter 4 ----
  { id:"Q4.1", ch:"4", diff:"E", type:"MCQ",
    prompt: "MQTT uses which communication pattern?",
    options: ["Client–server request/response","Publish–subscribe via a broker","Peer-to-peer flooding","Direct device-to-device"],
    correct: [1],
    explain: "MQTT is pub/sub: publishers send to a broker; broker routes to subscribers." },

  { id:"Q4.2", ch:"4", diff:"E", type:"MRQ",
    prompt: "Which are the three types of decoupling in pub/sub?",
    options: ["Space decoupling","Protocol decoupling","Time decoupling","Synchronization decoupling","Payload decoupling"],
    correct: [0,2,3],
    explain: "Space (no IP/port knowledge), Time (not simultaneously online), Synchronization (publisher doesn't wait for subscriber)." },

  { id:"Q4.3", ch:"4", diff:"M", type:"MCQ",
    prompt: "Which MQTT QoS level uses the PUBREC → PUBREL → PUBCOMP handshake?",
    options: ["QoS 0","QoS 1","QoS 2","Retained QoS"],
    correct: [2],
    explain: "QoS 2 (exactly once) uses the four-part handshake: PUBLISH → PUBREC → PUBREL → PUBCOMP." },

  { id:"Q4.4", ch:"4", diff:"M", type:"MCQ",
    prompt: "A publisher sends with QoS 2; a subscriber subscribed with QoS 0. What QoS does the broker use when delivering to that subscriber?",
    options: ["QoS 0","QoS 1","QoS 2","Depends on retained flag"],
    correct: [0],
    explain: "Broker uses the LOWER of publisher's and subscriber's QoS for delivery. min(2,0) = 0." },

  { id:"Q4.5", ch:"4", diff:"M", type:"FIB",
    prompt: "The MQTT wildcard <code>+</code> matches ___ level(s), while <code>#</code> matches ___ level(s) and must appear as the ___ character of the topic.",
    answer: "one, all remaining (or all), last",
    explain: "<code>+</code> = single-level wildcard (one). <code>#</code> = multi-level (all remaining) and must be the last character of the topic." },

  { id:"Q4.6", ch:"4", diff:"M", type:"MRQ",
    prompt: "Which are valid MQTT topic best practices?",
    options: [
      "Start topics with a leading `/`",
      "Keep topics short",
      "Use spaces to separate levels",
      "Embed Client ID for authorization",
      "Subscribe to `#` for easy debugging in production",
      "Design for extensibility"
    ],
    correct: [1,3,5],
    explain: "No leading `/`, no spaces, never subscribe to `#` in production (bandwidth killer). Keep topics short, embed client ID, and design for extensibility." },

  { id:"Q4.7", ch:"4", diff:"H", type:"SA",
    prompt: "A smart-lock sensor publishes its state and disappears from the network due to a power outage. Other devices need to know immediately that the lock is offline. Which MQTT features accomplish this, and how do they interact?",
    answer: "Last Will and Testament. The lock specifies its will message (topic + payload) when connecting. If it disconnects ungracefully — TCP drop without a DISCONNECT frame — the broker publishes the will to subscribers of that topic, notifying them of the unexpected offline." },

  { id:"Q4.8", ch:"4", diff:"H", type:"SA",
    prompt: "A campus-wide broadcast must reach devices that are currently offline (receiving it the moment they reconnect), exactly once, without duplicates. Which MQTT features would you combine? Briefly justify each.",
    answer: "(1) Retained Messages — the broker stores the last message per topic so late-joining subscribers receive it immediately. (2) QoS 2 — guarantees exactly-once delivery, preventing duplicates. (3) Persistent Sessions — offline subscribers catch up on missed QoS ≥1 messages when they reconnect." },

  { id:"Q4.9", ch:"4", diff:"M", type:"MATCH",
    prompt: "Match each MQTT communication pattern to its example:",
    pairs: [
      {left:"1. Point-to-point", right:"B. Occupancy sensor publishes to sensor/occupancy/room7; one display subscribes"},
      {left:"2. Broadcast", right:"A. Weather station publishes to dt/us/NY/weather; all trucks subscribe"},
      {left:"3. Fan-in", right:"C. Air-quality sensors publish per-zone; one aggregator uses + wildcard"}
    ],
    explain: "Point-to-point = one-to-one topic. Broadcast = one publisher to many subscribers via same topic. Fan-in = many publishers → one subscriber via wildcards." },

  { id:"Q4.10", ch:"4", diff:"H", type:"MCQ",
    prompt: "Shared subscriptions (<code>$share/GROUP/TOPIC</code>) are primarily useful for:",
    options: ["Reducing broker memory footprint","Load-balancing high-rate messages across a group of subscribers","Broadcasting retained messages","Encrypting topic names"],
    correct: [1],
    explain: "Shared subscriptions round-robin messages across clients in the same group — a load-balancer for high-rate topics." },

  { id:"Q4.11", ch:"4", diff:"E", type:"T/F",
    prompt: "Wildcards (<code>+</code> and <code>#</code>) can be used when publishing, not just when subscribing.",
    options: ["True","False"],
    correct: [1],
    explain: "False. Wildcards are subscribe-only. Publishing must always use a concrete topic." },

  { id:"Q4.12", ch:"4", diff:"M", type:"MCQ",
    prompt: "You have an MQTT topic with many publishers publishing sensor readings at a high frequency. You want multiple subscribers to split the workload of processing the sensor readings without overwhelming one single subscriber. The MQTT feature you should use is:",
    options: ["Retained Messages","QoS 2 (exactly once)","Shared Subscriptions","Last Will and Testament"],
    correct: [2],
    explain: "<strong>Shared Subscriptions</strong> (<code>$share/GROUPID/TOPIC</code>) distribute messages in a round-robin fashion among subscribers in the same group. This provides client load balancing — each message goes to only ONE subscriber in the group, rather than being duplicated to all subscribers. This is ideal for high-rate topics where processing must be distributed across multiple worker nodes." },

  // ---- Chapter 5 ----
  { id:"Q5.1", ch:"5", diff:"E", type:"MATCH",
    prompt: "Match data characteristic to best visualization:",
    pairs: [
      {left:"1. Categorical", right:"B. Pie"},
      {left:"2. Ordinal", right:"C. Bar/column"},
      {left:"3. Continuous", right:"A. Line/progression"}
    ],
    explain: "Categorical→pie (parts-of-whole), Ordinal→bars (discrete ordered), Continuous→lines (spans over time)." },

  { id:"Q5.2", ch:"5", diff:"M", type:"MCQ",
    prompt: "A heatmap is best described as:",
    options: ["A single-value dial","Histograms over time, showing trend patterns","A map with pins","A sequence of boxes representing discrete states"],
    correct: [1],
    explain: "A heatmap shows density/value across two axes — essentially histograms over time, useful for patterns like usage by hour/day." },

  { id:"Q5.3", ch:"5", diff:"M", type:"MRQ",
    prompt: "Ways to combat alert fatigue include:",
    options: [
      "Setting intelligent thresholds",
      "Making every alert critical to force attention",
      "Using tiered priorities (e.g., red+voice for urgent, amber text for advisory)",
      "Making alerts actionable with clear next steps",
      "Firing alerts at fixed intervals regardless of data"
    ],
    correct: [0,2,3],
    explain: "Thresholds, tiered priorities, and actionable messages combat fatigue. Flooding or constant-interval alerts cause it." },

  { id:"Q5.4", ch:"5", diff:"M", type:"FIB",
    prompt: "Translating data into visual form using attributes like color, shape, size, position, and length is called ____ ____.",
    answer: "visual encoding",
    explain: "Visual encoding." },

  { id:"Q5.5", ch:"5", diff:"M", type:"SA",
    prompt: "Why should color alone never be used to express meaning in an accessible visualization? Give one practical alternative.",
    answer: "Color-blind users and those viewing in low-contrast conditions can't reliably distinguish color. Always reinforce with another cue — icons, shape, labels, or patterns." },

  { id:"Q5.6", ch:"5", diff:"H", type:"SA",
    prompt: "You need a dashboard showing: (a) current temperature in a room, (b) machine state over the past week, (c) proportion of energy consumed by each appliance. Choose an appropriate chart type for each and briefly justify.",
    answer: "(a) Stat — single key metric at a glance. (b) State timeline — duration bars show how states changed over time. (c) Pie chart — part-to-whole proportions." },

  { id:"Q5.7", ch:"5", diff:"M", type:"MCQ",
    prompt: "What's a suitable visualization to compare the total energy consumption of five different buildings over a year, and why?",
    options: ["Time series line chart — shows trends over time","Bar chart — compares values across discrete categories","Pie chart — shows parts of a whole","Heatmap — shows patterns by hour and day"],
    correct: [1],
    explain: "<strong>Bar chart</strong> is most suitable. The five buildings are <em>discrete categories</em>, and we want to compare their total annual energy consumption (a single aggregate value per building). Bar charts excel at category comparison — the length of each bar directly represents the value, making differences immediately visible. A time series would be appropriate if we wanted to see how consumption changed <em>over the year</em> (monthly trends). A pie chart would work if we wanted to show each building's consumption as a <em>proportion of the total</em>, but comparing absolute values is clearer with bars. A heatmap is for two-dimensional patterns (e.g., hour × day)." },

  // ---- Chapter 6 ----
  { id:"Q6.1", ch:"6", diff:"E", type:"MCQ",
    prompt: "The principle \"lean data at edge, enrich in cloud\" primarily saves:",
    options: ["CPU cycles on the cloud","Device storage and transmission energy","Broker subscriptions","IP addresses"],
    correct: [1],
    explain: "Keeping data compact at the edge saves device storage and the energy cost of transmitting verbose data." },

  { id:"Q6.2", ch:"6", diff:"M", type:"MATCH",
    prompt: "Match each design pattern to its core idea:",
    pairs: [
      {left:"1. Command", right:"B. No action deemed successful unless acknowledged"},
      {left:"2. Device Bootstrap", right:"A. Two-phase credential upgrade from short-lived to long-lived"},
      {left:"3. Device State Replica", right:"C. Maintain current + desired + delta, sync via messaging topics"},
      {left:"4. Gateway", right:"D. Relay messages between devices and cloud when no direct Internet"},
      {left:"5. Telemetry Archiving", right:"E. Store raw data supporting in-order replay"}
    ],
    explain: "These are the five core patterns for reliable IoT architectures." },

  { id:"Q6.3", ch:"6", diff:"M", type:"ORDER",
    prompt: "Order the Software Update Pattern steps:",
    items: [
      "Device subscribes to state/deviceID/update/delta",
      "Application publishes desired state with software URL",
      "Replica publishes delta containing new software URL",
      "Device downloads and applies new software",
      "Device publishes ack with new version to state/deviceID/update"
    ],
    explain: "Subscribe → Publish desired → Delta → Download/apply → Ack. It combines Command + Device State Replica patterns." },

  { id:"Q6.4", ch:"6", diff:"M", type:"SA",
    prompt: "In the MVC device software pattern, why should the View never read directly from the hardware? What component is it supposed to read from instead?",
    answer: "Hardware reads are owned by the Model (via the HAL). If Views read hardware directly, hardware changes break every View. The View should read from the Model — so multiple views (LEDs, JSON, UI) can coexist and hardware swaps only require updating the HAL." },

  { id:"Q6.5", ch:"6", diff:"H", type:"MRQ",
    prompt: "A \"Zero Trust\" approach to IoT security implies:",
    options: [
      "Devices automatically trust other devices on the same LAN",
      "Every access request is verified regardless of source",
      "A compromised device should have minimal blast radius via least-privilege topic permissions",
      "Broker credentials are shared across all devices for simplicity",
      "Session tokens expire and must be re-negotiated"
    ],
    correct: [1,2,4],
    explain: "Zero Trust = verify every request, assume compromise, minimize privileges, rotate credentials. Never trust by location; never share creds." },

  { id:"Q6.6", ch:"6", diff:"E", type:"FIB",
    prompt: "A ______ is a regular status message a device sends to prove it is alive, enabling detection of silently-offline devices.",
    answer: "heartbeat",
    explain: "Heartbeat. Without it, a dead device appears indistinguishable from a quiet-but-healthy one." },

  { id:"Q6.7", ch:"6", diff:"H", type:"SA",
    prompt: "Why must the bootstrapping server support all firmware versions ever deployed? What failure mode is avoided by this rule?",
    answer: "Devices in the field may run any firmware version you've ever shipped. If the bootstrap server can't negotiate the old version's protocol, those devices can't re-provision and are effectively bricked. Supporting every version prevents orphaning legacy hardware." },

  { id:"Q6.8", ch:"6", diff:"H", type:"SA",
    prompt: "A smart home has a mix of Wi-Fi, Thread, and Bluetooth devices. Is the Gateway design pattern a suitable architecture? Why or why not?",
    answer: "<strong>Yes, the Gateway pattern is suitable.</strong><br><br><strong>Why it's suitable:</strong> The Gateway pattern (Chapter 6) is designed to relay messages between devices that lack direct network/Internet access and a server. In a smart home with mixed protocols:<br><br>• <strong>Thread devices</strong> cannot directly access Wi-Fi/Ethernet/Internet. The <strong>Thread Border Router</strong> implements the Gateway pattern perfectly — it relays messages from Thread devices to the Wi-Fi/Ethernet network (up gateway) and from the network back to Thread devices (down gateway).<br>• <strong>Bluetooth/BLE devices</strong> similarly need a gateway (phone or hub) to relay their messages to IP networks.<br><br>The Gateway pattern fulfills its intended purpose: <strong>network-layer message relay</strong> for devices without direct connectivity.<br><br><strong>Complete architecture with Matter:</strong> For full interoperability, combine the Gateway pattern with <strong>Matter</strong> — an application-layer protocol that provides a common data model. These work at different layers and are complementary:<br>• <strong>Gateway pattern</strong> (network layer): Thread Border Router relays messages between Thread mesh and Wi-Fi/Ethernet<br>• <strong>Matter</strong> (application layer): Ensures all devices — whether on Wi-Fi, Ethernet, or Thread — speak the same language (Nodes, Endpoints, Clusters, Attributes, Commands)<br><br>For legacy Bluetooth/Zigbee/Z-Wave devices, a <strong>Matter Bridge</strong> exposes them to the Matter ecosystem, combining gateway relay with protocol translation.<br><br>The Gateway pattern is suitable and necessary; Matter adds application-layer interoperability on top." },

  // ---- Chapter 7 ----
  { id:"Q7.1", ch:"7", diff:"E", type:"MCQ",
    prompt: "LoRa's physical layer uses:",
    options: ["OFDM","Chirp Spread Spectrum","DSSS with CDMA","FSK on a single channel"],

  { id:"Q7.2", ch:"7", diff:"M", type:"T/F",
    prompt: "A high Spreading Factor increases range and resilience to interference but also increases airtime and energy consumption per message.",
    options: ["True","False"],
    correct: [0],
    explain: "True. High SF → slow frequency change → longer range + more robustness, but longer airtime and more energy." },

  { id:"Q7.3", ch:"7", diff:"M", type:"MATCH",
    prompt: "Match each LoRaWAN class to its behavior:",
    pairs: [
      {left:"1. Class A", right:"B. Two short RX windows after each uplink; server can only send after device"},
      {left:"2. Class B", right:"C. Predictable ping slots, beacons every 128s for time sync"},
      {left:"3. Class C", right:"A. Receive window continuously open except during transmission"}
    ],
    explain: "A: lowest power, highest latency. B: medium. C: highest power, lowest latency." },

  { id:"Q7.4", ch:"7", diff:"E", type:"FIB",
    prompt: "LoRaWAN uses two encryption keys: a 128-bit ______ Session Key and a 128-bit ______ Session Key.",
    answer: "Network, Application",
    explain: "Network Session Key (device↔network server) + Application Session Key (end-to-end app layer). Enables multi-tenant shared networks." },

  { id:"Q7.5", ch:"7", diff:"M", type:"MCQ",
    prompt: "Uplink messages in LoRaWAN are:",
    options: [
      "Received by exactly one gateway and forwarded once",
      "Received by all in-range gateways; network server deduplicates",
      "Queued at the device until a gateway ACKs",
      "Broadcast by the network server to all devices"
    ],
    correct: [1],
    explain: "All in-range gateways forward the same packet; the network server deduplicates. This improves reliability." },

  { id:"Q7.6", ch:"7", diff:"H", type:"SA",
    prompt: "A farmer's soil-moisture sensor transmits 8-byte readings once per hour on batteries lasting 5+ years, ~2 km from the nearest gateway. Justify why Class A with a high spreading factor is appropriate, and identify one real-world constraint (e.g., regulation) that shapes the choice.",
    answer: "Class A has the lowest power draw — essential for 5+ year battery life. High SF extends range to reach a gateway 2 km away through obstacles. The hourly 8-byte cadence fits well within regulatory duty-cycle limits (typically 1% in LoRa-regulated bands), which cap how often a device may transmit regardless of battery." },

  { id:"Q7.7", ch:"7", diff:"M", type:"MCQ",
    prompt: "Activation-by-Personalization (ABP) is preferred when:",
    options: [
      "A consumer buys a device off the shelf",
      "A device is deployed directly to a known factory's network",
      "The device roams between operators",
      "OTA join-keys are unavailable"
    ],
    correct: [1],
    explain: "ABP hard-codes network session keys, appropriate only when you know the target network at provisioning time. OTA is for consumer/roaming cases." },

  { id:"Q7.8", ch:"7", diff:"E", type:"T/F",
    prompt: "A 1% duty cycle means a device may transmit up to 1 second out of every 100 seconds.",
    options: ["True","False"],
    correct: [0],
    explain: "True. Duty cycle = fraction of time transmitting. 1s / 100s = 1%." },

  { id:"Q7.9", ch:"7", diff:"M", type:"SA",
    prompt: "What are 3 differences between the 3 LoRaWAN classes A, B, and C?",
    answer: "<strong>1. Downlink Latency:</strong><br>• <strong>Class A</strong>: Highest latency — server can only send downlink messages <em>after</em> the device sends an uplink. Device opens two short receive windows (RX1, RX2) following each transmission, then goes back to sleep.<br>• <strong>Class B</strong>: Medium latency — adds predictable <strong>ping slots</strong> between uplinks. Gateways broadcast beacons every 128 seconds for time synchronization; device wakes at scheduled ping slots to listen.<br>• <strong>Class C</strong>: Lowest latency — receive window is <strong>continuously open</strong> (always listening) except during transmission. Server can send at any time.<br><br><strong>2. Power Consumption:</strong><br>• <strong>Class A</strong>: Lowest power — radio is off most of the time; only active during transmit and brief RX windows. Best for battery-powered sensors.<br>• <strong>Class B</strong>: Medium power — must wake periodically for beacons and ping slots, more active than Class A.<br>• <strong>Class C</strong>: Highest power — radio receiver always on. Only suitable for mains-powered devices.<br><br><strong>3. Receive Window Behavior:</strong><br>• <strong>Class A</strong>: Two short RX windows after each uplink (RX1 ~1s after TX at uplink frequency, RX2 at fixed frequency). No other receive opportunities.<br>• <strong>Class B</strong>: Class A windows PLUS scheduled ping slots (up to 4096 per 128s beacon period). Device can receive at predictable times without sending first.<br>• <strong>Class C</strong>: RX window open continuously — closes only during transmission, reopens immediately after." },

  { id:"Q8.6", ch:"8", diff:"M", type:"SA",

  { id:"Q9.5", ch:"9", diff:"M", type:"MCQ",
    prompt: "A Matter Controller first uses which technology during commissioning to pass network credentials?",
    options: ["Zigbee","BLE","Thread","NFC"],
    correct: [1],

  { id:"Q9.6", ch:"9", diff:"H", type:"SA",
    prompt: "Describe the intercept attack scenario that Timed Transactions defend against, and explain the timeout's role. Why are Timed Transactions recommended only for critical operations?",
    answer: "Attacker jams/intercepts Alice's message to Bob, collects a second one, then replays the first; the second can be held and replayed later (e.g., \"unlock door\" at attacker's timing). Timed Transactions set a maximum timeout so replayed messages are rejected as expired. They add complexity and round-trips, so they're reserved for high-impact ops like locks or garage doors." },

  { id:"Q9.7", ch:"9", diff:"M", type:"MRQ",
    prompt: "Which are valid Matter transaction types?",
    options: ["Read","Invoke","Forward","Subscribe","Write"],
    correct: [0,1,3,4],
    explain: "Read, Subscribe, Write, Invoke. Forward is not a Matter transaction type." },

  { id:"Q9.8", ch:"9", diff:"H", type:"SA",
    prompt: "Why does the Thread Border Router only forward selected multicast traffic from Wi-Fi into the Thread mesh, rather than bridging all multicast transparently?",
    answer: "Thread's bandwidth is orders of magnitude less than Wi-Fi. Blindly bridging all Wi-Fi multicast would flood the Thread mesh and starve real traffic. The Border Router publishes only relevant multicast (e.g., mDNS for Thread Nodes) and filters the rest." },

  { id:"Q9.9", ch:"9", diff:"E", type:"T/F",
    prompt: "A Matter Node can only belong to a single Fabric at a time.",
    options: ["True","False"],
    correct: [1],
    explain: "False. Multi-Admin allows a Node to belong to multiple Fabrics (e.g., both Google Home's and Apple Home's)." },

  { id:"Q9.10", ch:"9", diff:"M", type:"MCQ",
    prompt: "The \"popcorn effect\" in Matter refers to:",
    options: [
      "Repeated retransmissions of lost packets",
      "Visible sequential delays when individually commanding many devices; solved by Groups",
      "Devices rapidly cycling between sleep and wake states",
      "BLE pairing attempts colliding with Thread beacons"
    ],
    correct: [1],
    explain: "Popcorn effect: sending commands one-by-one creates visible delays (like popcorn popping in sequence). Groups + multicast commands solve it." },

  { id:"Q9.11", ch:"9", diff:"M", type:"SA",
    prompt: "In a Matter-enabled smart home, when there is no internet connection, will the Matter devices still be able to communicate and automate tasks within the local network? Explain why or why not.",
    answer: "<strong>Yes, Matter devices will continue to work without internet.</strong><br><br><strong>Why it works:</strong><br>• Matter is built on <strong>IPv6</strong> and operates as an <strong>application-layer protocol</strong> over local network transports (Wi-Fi, Ethernet, Thread). All operational communication happens locally — devices address each other directly using IPv6 addresses within the local <strong>Fabric</strong> (security domain).<br><br>• The <strong>Thread Border Router</strong> bridges Thread devices to the Wi-Fi/Ethernet network locally — it doesn't require cloud connectivity to perform this bridging function. Thread mesh communication continues independently.<br><br>• During <strong>commissioning</strong>, BLE is used to pass network credentials — this is also a local operation between the Commissioner (e.g., phone) and the new device.<br><br>• Matter's <strong>Interaction Model</strong> (Read, Write, Subscribe, Invoke transactions) operates directly between Nodes on the local network. A Controller (e.g., Google Nest Hub) can send commands to Controlees (e.g., smart lights) without routing through the cloud.<br><br>• <strong>Automations</strong> that run on local Controllers (e.g., \"turn on lights when motion detected\") continue to function because the logic executes locally.<br><br><strong>What may NOT work without internet:</strong><br>• Voice assistants that require cloud processing (\"Hey Google, turn on lights\")<br>• Remote access from outside the home<br>• OTA firmware updates<br>• Cloud-dependent automations or scenes stored on external servers<br><br>This local-first design is intentional — Matter was designed to <strong>work within a firewalled network</strong> without requiring internet connectivity for basic operation." },

  // ---- System Design Scenarios ----
  { id:"S1", ch:"SD", diff:"M", type:"SD",
    prompt: "<strong>Smart Campus Environmental Monitoring.</strong> Design an end-to-end system that deploys ~200 battery-powered air-quality sensors across a university campus. Required: real-time dashboard, historical replay, alerting on threshold breaches, and sensor firmware updates.<br><br>1. Which connectivity technology would you use for the sensors, and why?<br>2. Design the MQTT topic hierarchy. Give 3 example topic strings.<br>3. Which design patterns from Chapter 6 apply? Name at least three and state how each is used.<br>4. What QoS level(s) would you choose for telemetry vs alerts vs config updates? Justify each.<br>5. How would you visualize: (a) a live reading, (b) air-quality patterns by hour over the past month, (c) recent critical alerts?",
    answer: "<strong>1.</strong> LoRaWAN (battery life, outdoor range) or Thread (if building coverage exists). Cellular if isolated pockets. <strong>2.</strong> Topics: <code>campus/soss/L3/r321/airq/pm25</code>, <code>campus/soss/L3/r321/airq/co2</code>, <code>campus/soss/L3/r321/status/heartbeat</code>. Keep short, hierarchical, embed location + metric. <strong>3.</strong> Telemetry (per-sensor publishes), Telemetry Archiving (raw storage for replay), Software Update (firmware OTA via Device State Replica + Command), Device Bootstrap (secure provisioning), Gateway (LoRa gateways). <strong>4.</strong> Telemetry QoS 1 (delivery matters but duplicates OK); alerts QoS 2 (exactly once, critical); config updates QoS 2 (exactly once). <strong>5.</strong> (a) Stat, (b) Heatmap of hour × day, (c) Alert list." },

  { id:"S2", ch:"SD", diff:"H", type:"SD",
    prompt: "<strong>Cold-Chain Logistics.</strong> A pharmaceutical company ships temperature-sensitive vaccines in insulated containers across several countries. Each container has: temperature sensor, GPS, accelerometer. You must detect temperature excursions and delivery location in near-real-time, and provide a replay for audit after delivery.<br><br>1. Compare cellular vs LoRaWAN for this deployment. Pick one and justify considering range, power, payload, and cost.<br>2. How would the Telemetry Archiving Pattern support the audit requirement?<br>3. Design the device state replica to separate \"desired\" (e.g., upper/lower temp thresholds) from \"current\" (latest reading).<br>4. How would you handle the case when the container enters a warehouse with no cellular signal for 8 hours?<br>5. Which MQTT feature ensures a subscriber joining mid-flight immediately sees the last known container status?",
    answer: "<strong>1.</strong> Cellular (NB-IoT/LTE-M) — cross-border roaming, near-real-time, reasonable power, and needed payload. LoRaWAN requires gateways that can't follow a shipping container. <strong>2.</strong> Raw timestamped readings stored on ingestion; post-delivery, auditors replay the full temp/GPS timeline to verify compliance. <strong>3.</strong> Replica holds desired thresholds (e.g., <code>min=2°C, max=8°C</code>) and current readings. Delta topics let the server push updated thresholds mid-transit. <strong>4.</strong> Device buffers readings locally with timestamps; on reconnect, replays queued telemetry via QoS 1/2 + persistent sessions. <strong>5.</strong> Retained Messages — last status is delivered immediately to new subscribers." },

  { id:"S3", ch:"SD", diff:"H", type:"SD",
    prompt: "<strong>Smart Home with Matter + Thread.</strong> Design a smart home with: 1 Border Router, 3 always-on devices (smart plugs), 5 Sleepy End Devices (door/window sensors), and 1 smart lock. The owner uses both Google Home and Apple Home.<br><br>1. Explain the role of the Border Router in bridging Thread and Wi-Fi.<br>2. Why are Timed Transactions appropriate for the smart lock but unnecessary for the door sensors?<br>3. How does Multi-Admin (Fabrics) allow both Google Home and Apple Home to control the same lock?<br>4. Describe how the proxy architecture lets the Sleepy End Devices conserve power while still appearing responsive.<br>5. During commissioning of the new lock, describe the protocol handoff — from BLE to IPv6.",
    answer: "<strong>1.</strong> Border Router auto-configures IPv6 for both networks, publishes mDNS for Thread nodes, forwards only relevant multicast to Thread (avoiding Thread bandwidth exhaustion). <strong>2.</strong> Lock actions are high-impact + security-critical (intercept-replay risk); Timed Transactions reject expired messages. Door sensors just report open/closed; a replayed \"open\" is low-value. <strong>3.</strong> Multi-Admin: the lock is commissioned into both fabrics; each maintains its own credentials; cluster state is shared so both Homes see consistent state. <strong>4.</strong> Full-powered proxy nodes subscribe on behalf of sleeping children; when a controller sends a command, the proxy buffers and forwards at the SED's next wake. <strong>5.</strong> BLE carries network credentials securely during commissioning; once the lock joins Thread/IPv6, BLE is no longer used and all messaging is IPv6." },

  { id:"S4", ch:"SD", diff:"M", type:"SD",
    prompt: "<strong>Factory Predictive Maintenance.</strong> A factory has 50 industrial machines that must be monitored for vibration, temperature, and current. Predictive ML must run in the cloud; alerts must reach operators in &lt;5 seconds.<br><br>1. Where should the \"edge\" processing happen, and what should be sent to the cloud? Apply \"lean data at edge, enrich in cloud.\"<br>2. Draw out the topic hierarchy using <code>factory/machineID/...</code> with at least 3 leaf topics. Explain how you'd avoid over-specific or over-general topics.<br>3. Which combination of MQTT Retained Messages and Last Will and Testament would give operators a realistic \"is this machine online right now?\" view on the dashboard?<br>4. How would you buffer telemetry if the ingestion system briefly fails? Reference a Chapter 6 principle.<br>5. Name one reliability practice you'd use to test the system before full deployment.",
    answer: "<strong>1.</strong> Edge computes vibration RMS/FFT features, detects threshold breaches; uploads summaries + anomalies, not raw 10kHz streams. <strong>2.</strong> <code>factory/line5/m12/vibration</code>, <code>factory/line5/m12/temp</code>, <code>factory/line5/m12/current</code>, <code>factory/line5/m12/status/heartbeat</code>. Separate topics per metric (specific) but grouped by machine (extensible). <strong>3.</strong> Retained on <code>.../status/online</code> publishes \"online\" on connect; Last Will publishes \"offline\" to the same topic on ungraceful disconnect. Dashboard subscribes once and always sees the current state. <strong>4.</strong> Buffer with queues (Chapter 6: Reliability) — decouple ingestion from processing so spikes and brief outages don't drop data. <strong>5.</strong> Simulate at production scale: 10% → 25% → 50% → 100% traffic to surface scaling issues before rollout." },

  { id:"S5", ch:"SD", diff:"H", type:"SD",
    prompt: "<strong>Public Restroom Cleanliness (Wild Card).</strong> A facilities team wants real-time occupancy + odor detection + soap/paper dispenser levels across 40 campus restrooms. Cleaners carry phones. Deployment must be cheap, low-maintenance, and privacy-respecting.<br><br>1. Choose sensors for: occupancy, odor, dispenser fill level. Justify each with the sensor-selection criteria from Chapter 2.<br>2. Which connectivity would you use and why (Wi-Fi, Thread, LoRaWAN, or cellular)? Consider building penetration and power.<br>3. Design a simple MQTT topic tree and describe how cleaner phones subscribe only to their assigned buildings (hint: wildcards).<br>4. How would you avoid alert fatigue on cleaner phones? Reference at least two techniques from Chapter 5.<br>5. Privacy: identify one risk and propose a mitigation.",
    answer: "<strong>1.</strong> Occupancy: PIR motion sensor (low cost, low power, event-driven). Odor: gas sensor for NH3/H2S (periodic threshold, chemical modality). Dispenser fill: weight or IR distance sensor (periodic, mains or battery). <strong>2.</strong> Thread inside buildings — mesh handles concrete walls, low power for SEDs, IPv6-ready. Gateway uplinks to campus MQTT. <strong>3.</strong> Topics: <code>campus/bldg/B3/rr/M2/occupancy</code>, <code>.../odor</code>, <code>.../dispenser/soap</code>. Cleaner phones subscribe <code>campus/bldg/B3/#</code> for their assigned building. <strong>4.</strong> Tiered priorities (critical vs advisory), actionable messages (\"Refill soap, floor 3\"), intelligent thresholds. <strong>5.</strong> Risk: occupancy sensors could infer individual schedules. Mitigation: no cameras; report aggregate counts with time bucketing; avoid persistent device IDs tied to users." },

  { id:"S6", ch:"SD", diff:"H", type:"SD",
    prompt: "<strong>Aura Arcade Smart Shopping Mall.</strong> The Aura Arcade shopping mall experiences large crowds, especially during weekends and holidays. Mall management would like to accurately monitor visitor patterns to ensure more efficient allocation of resources such as customer service counter staff, cleaning staff, maintenance staff, and security staff. Retailers within the mall are keen to understand shopper behavior more precisely, such as which areas attract the most attention, the average dwell times near storefronts, and peak shopping periods. They would also like to know the best times and places to have promotional events such as roadshows.<br><br>Additionally, the mall management would like to monitor the lighting and temperature at various locations in the mall, to adjust lighting and air-conditioning systems automatically.<br><br>Design an IoT solution for the shopping mall. State any reasonable assumptions.<br><br>1. What sensors will be used?<br>2. Propose a suitable MQTT configuration, explain why each configuration setting is needed.<br>3. Visualization: design suitable operations, analytics or presentation dashboards to show data as needed.<br>4. Describe the architecture and any relevant design patterns.<br>5. Connectivity:<br>&nbsp;&nbsp;a. What IoT connectivity technology would you use to solve this challenge, and why?<br>&nbsp;&nbsp;b. What are the network performance requirements (distance, data rate, energy, etc)?<br>&nbsp;&nbsp;c. What are potential sources of interference?<br>&nbsp;&nbsp;d. What are the infrastructure and site constraints?<br>&nbsp;&nbsp;e. What are the needs for inter-operability with existing systems, if any?",
    answer: "<strong>Assumptions:</strong> Multi-level mall (~50,000 sqm), existing Wi-Fi infrastructure, mains power available at key locations, existing Building Management System (BMS) for HVAC/lighting control, mall operates 10am-10pm daily.<br><br><strong>1. SENSORS</strong><br><br><strong>Visitor Pattern Monitoring:</strong><br>• <strong>BLE Beacons</strong> (Fixed Beacons, Mobile Receivers): Deploy beacons at mall entrances, zone boundaries, and near storefronts. Visitors' smartphones act as mobile receivers. RSSI enables proximity estimation and dwell time calculation. Low cost, low power (coin cell batteries last years), passive for visitors.<br>• <strong>PIR Motion Sensors</strong> (Environmental/Position): For counting foot traffic at entrances/exits and zone transitions. Event-driven, low power, privacy-preserving (no images captured).<br>• <strong>Thermal/IR People Counters</strong> (Vision): Bi-directional counting at entrances using thermal imaging. Distinguishes entry vs exit. Privacy-friendly as no identifiable images are stored.<br>• <strong>Wi-Fi Probe Request Sensors</strong>: Detect smartphones scanning for Wi-Fi networks. Provides aggregate crowd density without requiring app installation. Must anonymize MAC addresses for privacy.<br><br><strong>Environmental Monitoring:</strong><br>• <strong>Temperature Sensors</strong> (Environmental): Digital temperature sensors at multiple zones for HVAC optimization. Periodic readings (every 30-60 seconds).<br>• <strong>Light Sensors/Lux Meters</strong> (Environmental): Measure ambient light levels for automatic lighting adjustment. Can differentiate between natural and artificial light.<br>• <strong>Humidity Sensors</strong> (Environmental): Often combined with temperature sensors; important for shopper comfort and HVAC efficiency.<br><br><strong>Sensor Selection Justification (Chapter 2 criteria):</strong><br>• Context needed: Visitor patterns → BLE beacons + PIR for presence/proximity<br>• Specifications: BLE range ~10-30m indoor (sufficient for zone coverage), PIR event-driven (saves power)<br>• Power: Mains for environmental sensors at fixed locations; battery for distributed beacons<br>• Budget: BLE beacons are cost-effective (~$10-30 each), PIR sensors inexpensive<br>• Compliance: No cameras for visitor tracking (privacy); thermal counters anonymize<br>• Maintenance: BLE beacons require minimal maintenance (battery replacement yearly)<br><br><strong>2. MQTT CONFIGURATION</strong><br><br><strong>Topic Hierarchy:</strong><br><pre>mall/aura/&lt;floor&gt;/&lt;zone&gt;/&lt;sensor_type&gt;/&lt;metric&gt;</pre><br><strong>Example Topics:</strong><br>• <code>mall/aura/L1/entrance_main/footfall/count</code><br>• <code>mall/aura/L2/zone_A/beacon/b001/rssi</code><br>• <code>mall/aura/L3/food_court/environment/temperature</code><br>• <code>mall/aura/L1/store_nike/dwell/average</code><br>• <code>mall/aura/status/sensor/&lt;sensorID&gt;/heartbeat</code><br><br><strong>Why this structure:</strong><br>• Hierarchical by location enables wildcard subscriptions: retailers subscribe to <code>mall/aura/+/store_nike/#</code> for their store data across floors<br>• Mall management subscribes to <code>mall/aura/#</code> for all data or <code>mall/aura/+/+/environment/#</code> for all environmental sensors<br>• Extensible: new zones or sensor types added without restructuring<br>• No leading <code>/</code>, no spaces, ASCII only (best practices)<br>• Client ID embedded in heartbeat topics for authorization<br><br><strong>QoS Levels:</strong><br>• <strong>Telemetry (temperature, light, footfall counts): QoS 1</strong> — At least once delivery; duplicates acceptable; ensures data reaches analytics pipeline<br>• <strong>Alerts (temperature threshold breach, crowd capacity warning): QoS 2</strong> — Exactly once; critical for safety; prevents duplicate alert fatigue<br>• <strong>Configuration updates (HVAC setpoints, lighting schedules): QoS 2</strong> — Exactly once; prevents misconfigurations<br>• <strong>Heartbeats: QoS 0</strong> — Fire and forget; next heartbeat will indicate status anyway<br><br><strong>Retained Messages:</strong><br>• Enable for <code>.../status/online</code> topics — new dashboard subscribers immediately see current device status<br>• Enable for <code>.../environment/temperature</code> — dashboards show last known value without waiting for next publish<br><br><strong>Last Will and Testament:</strong><br>• All sensors set Last Will to publish <code>offline</code> to <code>mall/aura/status/sensor/&lt;sensorID&gt;/online</code><br>• Enables immediate detection of sensor failures for maintenance alerts<br><br><strong>Persistent Sessions:</strong><br>• Enable for analytics subscribers — if they disconnect briefly, they receive missed QoS 1/2 messages on reconnect<br>• Session expiry: 1 hour (reasonable for temporary disconnections)<br><br><strong>Shared Subscriptions:</strong><br>• For high-volume beacon RSSI data: <code>$share/analytics/mall/aura/+/+/beacon/#</code><br>• Load-balances processing across multiple analytics worker nodes<br><br><strong>3. VISUALIZATION DASHBOARDS</strong><br><br><strong>Operations Dashboard (Mall Management):</strong><br>• <strong>Stat panels</strong>: Current total visitors in mall, today's peak count, current crowd density %<br>• <strong>Geomap/Floor plan heatmap</strong>: Real-time crowd density by zone overlaid on mall floor plan; color intensity = visitor density<br>• <strong>Alert list</strong>: Recent alerts (sensor offline, crowd capacity warning, temperature threshold breach) with status and timestamps<br>• <strong>Gauge</strong>: Current temperature vs target range for each HVAC zone<br>• <strong>State timeline</strong>: HVAC/lighting system states over past 24 hours (on/off/eco mode)<br><br><strong>Analytics Dashboard (Management + Retailers):</strong><br>• <strong>Time series line chart</strong>: Visitor count over time (hourly/daily/weekly trends)<br>• <strong>Heatmap</strong>: Visitor patterns by hour-of-day vs day-of-week — reveals peak shopping periods<br>• <strong>Bar chart</strong>: Dwell time comparison across zones/stores<br>• <strong>Pie chart</strong>: Proportion of visitors by zone (which areas attract most attention)<br>• <strong>Histogram</strong>: Distribution of visit durations<br><br><strong>Retailer Dashboard (Individual Store View):</strong><br>• <strong>Stat</strong>: Current footfall near storefront, today's total, conversion rate (if POS integrated)<br>• <strong>Time series</strong>: Hourly foot traffic past 7 days with comparison to previous week<br>• <strong>Bar gauge</strong>: Current dwell time vs store average<br>• <strong>Table</strong>: Best times for promotions (ranked by foot traffic and dwell time)<br><br><strong>Environmental Dashboard:</strong><br>• <strong>Stat</strong>: Current temperature/humidity per zone<br>• <strong>Time series</strong>: Temperature readings over past 24 hours with threshold lines<br>• <strong>State timeline</strong>: HVAC activation history<br>• <strong>Alert list</strong>: Temperature/lighting alerts requiring attention<br><br><strong>Alert Fatigue Prevention (Chapter 5):</strong><br>• Intelligent thresholds: Temperature alerts only when ±3°C from setpoint for >5 minutes (avoid transient spikes)<br>• Tiered priorities: Critical (safety/capacity) → Warning (efficiency) → Advisory (optimization suggestions)<br>• Actionable alerts: \"Zone B temperature 28°C — Increase AC output\" rather than just \"High temperature\"<br><br><strong>4. ARCHITECTURE AND DESIGN PATTERNS</strong><br><br><strong>Overall Architecture:</strong><br><pre>Sensors → Thread/BLE Gateways → MQTT Broker → Processing Layer → Dashboards/BMS<br>                                     ↓<br>                              Raw Data Archive</pre><br><br><strong>Design Patterns Applied:</strong><br><br>• <strong>Telemetry Pattern</strong>: All sensors publish measurements to their respective topics. Server applies routing rules to fan out to analytics, archiving, and alerting components.<br><br>• <strong>Telemetry Archiving Pattern</strong>: Raw timestamped sensor data stored in time-series database. Enables:<br>&nbsp;&nbsp;- Historical replay for trend analysis<br>&nbsp;&nbsp;- Retailer reports on past promotional event effectiveness<br>&nbsp;&nbsp;- Audit trail for compliance<br>&nbsp;&nbsp;- ML model training for predictive analytics<br><br>• <strong>Gateway Pattern</strong>: Thread Border Routers and BLE gateways relay messages between sensors and cloud/edge server. Sensors without direct internet access communicate via gateway.<br>&nbsp;&nbsp;- Up gateway: Sensor → Gateway → MQTT Broker (telemetry)<br>&nbsp;&nbsp;- Down gateway: MQTT Broker → Gateway → Sensor (configuration)<br><br>• <strong>Device State Replica Pattern</strong>: For HVAC and lighting control:<br>&nbsp;&nbsp;- Current state: Actual temperature, light level, system status<br>&nbsp;&nbsp;- Desired state: Target temperature, lighting schedule, mode settings<br>&nbsp;&nbsp;- Delta: Difference triggers automatic adjustments<br>&nbsp;&nbsp;- Topics: <code>state/hvac/zoneA/update</code>, <code>state/hvac/zoneA/update/delta</code><br><br>• <strong>Command Pattern</strong>: For actuator control (HVAC, lighting):<br>&nbsp;&nbsp;- No action deemed successful unless acknowledged<br>&nbsp;&nbsp;- Example: \"Set Zone A to 24°C\" → HVAC publishes acknowledgement with new setpoint<br>&nbsp;&nbsp;- Handles unreliable network gracefully<br><br>• <strong>Software Update Pattern</strong>: Combines Command + Device State Replica for OTA firmware updates to sensors/gateways:<br>&nbsp;&nbsp;- Application publishes desired state with firmware URL<br>&nbsp;&nbsp;- Device downloads, applies, and acknowledges<br><br>• <strong>Device Bootstrap Pattern</strong>: New sensors provisioned securely:<br>&nbsp;&nbsp;- Phase 1: Sensor registers with shared token → receives short-lived credentials<br>&nbsp;&nbsp;- Phase 2: After validation → receives long-lived certificates<br>&nbsp;&nbsp;- Bootstrapping server supports all firmware versions (prevents bricking legacy sensors)<br><br><strong>General Principles Applied:</strong><br>• <strong>Lean data at edge, enrich in cloud</strong>: Edge gateways aggregate beacon RSSI into zone occupancy counts before transmitting; raw RSSI only sent if needed for detailed analytics<br>• <strong>Decouple ingestion from processing</strong>: Message queues buffer incoming telemetry; analytics processes independently<br>• <strong>Design for offline behavior</strong>: Sensors buffer readings locally during gateway/broker outages; persistent sessions recover missed messages<br>• <strong>Heartbeats</strong>: All sensors publish heartbeat every 5 minutes; missing heartbeat triggers maintenance alert<br>• <strong>Security at all layers</strong>: TLS encryption, per-device certificates, least-privilege topic permissions (a temperature sensor cannot publish to footfall topics)<br><br><strong>5. CONNECTIVITY</strong><br><br><strong>5a. Recommended Technology: Thread + Wi-Fi Hybrid</strong><br><br><strong>Primary: Thread mesh network</strong> for majority of sensors<br>• <strong>Why Thread:</strong><br>&nbsp;&nbsp;- IP-based networking: Every device gets IPv6 address, easy integration with existing IP infrastructure<br>&nbsp;&nbsp;- Self-healing mesh: No single point of failure; if one router fails, traffic reroutes automatically<br>&nbsp;&nbsp;- Low power: Sleepy End Devices (SEDs) for battery-powered sensors (beacons, some PIR sensors)<br>&nbsp;&nbsp;- Scalable: Up to 250+ devices per network; Thread Domains enable multiple networks working together<br>&nbsp;&nbsp;- Secure: All communications encrypted by default<br>&nbsp;&nbsp;- Indoor-optimized: Spread spectrum technology provides good immunity to interference<br><br><strong>Thread Deployment:</strong><br>• Thread Border Routers at each floor (bridge to mall's Wi-Fi/Ethernet backbone)<br>• Environmental sensors as Full Thread Devices (mains-powered, always on, can route)<br>• Battery beacons as Sleepy End Devices (wake periodically, minimal power)<br>• PIR counters as REEDs (can become routers if needed for coverage)<br><br><strong>Secondary: Wi-Fi</strong> for high-bandwidth devices<br>• Video-based people counters (thermal cameras) that need higher data rates<br>• Dashboard displays<br>• Integration with existing BMS (likely already on Wi-Fi/Ethernet)<br><br><strong>Why NOT LoRaWAN:</strong><br>• Indoor mall already has infrastructure; LoRaWAN better for outdoor/remote deployments<br>• Higher data rate needed for real-time crowd analytics (LoRaWAN max ~50 kbps, ~200 bytes payload)<br>• No need for multi-kilometer range<br><br><strong>Why NOT pure Wi-Fi:</strong><br>• Wi-Fi power consumption too high for battery devices<br>• Mall Wi-Fi congested with shopper traffic<br>• Thread provides better mesh resilience<br><br><strong>5b. Network Performance Requirements:</strong><br><br>• <strong>Distance</strong>: Thread radio range ~10-30m indoors; mesh extends effective range across entire mall floor; Border Router every ~500 sqm for reliable coverage<br>• <strong>Data rate</strong>: Thread provides 250 kbps at physical layer; sufficient for low-rate sensor telemetry (temperature: ~50 bytes every 30s; beacon: ~100 bytes every 1s; footfall: ~20 bytes per event)<br>• <strong>Latency</strong>: <5 seconds for operational dashboards (real-time crowd monitoring); <1 minute acceptable for analytics/trends<br>• <strong>Energy</strong>: Mains-powered sensors: no constraint (FTDs always on). Battery sensors: Target 2+ year battery life; Thread SEDs with 1% duty cycle achieve this<br>• <strong>Reliability</strong>: 99.9% uptime for critical systems (crowd safety alerts); mesh topology provides redundancy<br><br><strong>5c. Potential Sources of Interference:</strong><br><br>• <strong>2.4 GHz congestion</strong>: Thread operates on 2.4 GHz (same as Wi-Fi, Bluetooth, microwave ovens); mall Wi-Fi from retailers and shoppers creates interference<br>&nbsp;&nbsp;- Mitigation: Thread's spread spectrum technology provides interference resilience; 16 available channels; auto channel selection avoids congested frequencies<br>• <strong>Physical obstructions</strong>: Concrete floors/walls, metal fixtures, refrigeration units in food court<br>&nbsp;&nbsp;- Mitigation: Mesh topology routes around obstacles; adequate router density<br>• <strong>Retail RF equipment</strong>: RFID readers at store exits, wireless POS systems<br>&nbsp;&nbsp;- Mitigation: Frequency coordination during deployment; monitor link quality<br>• <strong>Elevator shafts and escalator machinery</strong>: EMI from motors<br>&nbsp;&nbsp;- Mitigation: Place Thread routers away from machinery; use shielded gateways<br>• <strong>Seasonal decorations</strong>: Metal decorations during holidays can affect propagation<br>&nbsp;&nbsp;- Mitigation: Self-healing mesh adapts; monitor and add temporary routers if needed<br><br><strong>5d. Infrastructure and Site Constraints:</strong><br><br>• <strong>Power availability</strong>: Mains power available at ceiling/wall fixtures; battery backup for critical gateways<br>• <strong>Aesthetics</strong>: Sensors must be discrete (mall environment); small form-factor Thread sensors fit in ceiling tiles or light fixtures<br>• <strong>Installation access</strong>: Installation during non-operating hours (10pm-10am); minimize disruption<br>• <strong>Cabling</strong>: Thread minimizes new cabling (wireless mesh); Border Routers need Ethernet/power<br>• <strong>Tenant coordination</strong>: Individual store sensors require retailer approval; common area sensors managed by mall<br>• <strong>Outdoor areas</strong>: Parking lots may need separate LoRaWAN or cellular coverage (not Thread)<br>• <strong>Heritage/structural restrictions</strong>: Some malls have heritage ceilings; surface-mount solutions needed<br><br><strong>5e. Interoperability with Existing Systems:</strong><br><br>• <strong>Building Management System (BMS)</strong>: MQTT broker integrates with BMS via standard protocols (BACnet/IP gateway or REST API). Device State Replica pattern synchronizes setpoints bidirectionally.<br>• <strong>Existing Wi-Fi infrastructure</strong>: Thread Border Routers connect to mall Ethernet backbone; no conflict with existing Wi-Fi; can leverage existing network monitoring tools<br>• <strong>Point-of-Sale (POS) systems</strong>: Optional integration for conversion analytics; API-based data exchange (footfall near store + sales data)<br>• <strong>Digital signage</strong>: Dashboard integration via web interface; signage displays crowd info or promotional suggestions<br>• <strong>Emergency systems</strong>: Fire alarm integration for evacuation mode (override normal operation); crowd monitoring supports evacuation management<br>• <strong>Matter compatibility</strong>: If smart lighting uses Matter, Thread provides native transport layer. Matter controllers can manage lighting endpoints directly. Endpoint 0 Utility Clusters for diagnostics.<br>• <strong>Legacy sensors</strong>: If existing sensors use Zigbee/Z-Wave, Matter bridges provide interoperability; bridge devices expose legacy sensors to the Matter/Thread ecosystem" }
];

// ============= RENDERER =============
const root = document.getElementById('questions-root');
const state = {}; // id -> {selected:[], revealed:bool, correct:bool}

const CH_TITLES = {
  "1":"Chapter 1 — Introduction to IoT",
  "2":"Chapter 2 — Things and Sensors",
  "3":"Chapter 3 — TCP/IP & HTTP REST",
  "4":"Chapter 4 — MQTT",
  "5":"Chapter 5 — Data Visualization",
  "6":"Chapter 6 — IoT Architecture & Design",
  "7":"Chapter 7 — LoRaWAN",
  "8":"Chapter 8 — Thread",
  "9":"Chapter 9 — Matter",
  "SD":"IoT System Design Scenarios"
};

function letter(i) { return String.fromCharCode(65+i); }

function render() {
  root.innerHTML = '';
  let currentCh = null;

  QUESTIONS.forEach(q => {
    if (q.ch !== currentCh) {
      currentCh = q.ch;
      const h = document.createElement('h2');
      h.className = 'chapter-heading';
      h.textContent = CH_TITLES[q.ch] || q.ch;
      h.dataset.chapter = q.ch;
      root.appendChild(h);
    }
    root.appendChild(renderQuestion(q));
  });

  document.getElementById('total-count').textContent = QUESTIONS.length;
  updateCounts();
}

function renderQuestion(q) {
  state[q.id] = state[q.id] || { selected: [], revealed: false, correct: null };
  const el = document.createElement('div');
  el.className = 'question';
  el.dataset.id = q.id;
  el.dataset.chapter = q.ch;
  el.dataset.diff = q.diff;

  // Header
  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `
    <span class="q-id">${q.id}</span>
    <span class="tag tag-${q.diff}">${q.diff === 'E' ? 'Easy' : q.diff === 'M' ? 'Medium' : 'Hard'}</span>
    <span class="tag tag-type">${q.type}</span>
  `;
  el.appendChild(header);

  // Prompt
  const prompt = document.createElement('div');
  prompt.className = 'q-prompt';
  prompt.innerHTML = `<p>${q.prompt}</p>`;
  el.appendChild(prompt);

  // Body
  if (q.type === 'MCQ' || q.type === 'T/F') {
    el.appendChild(renderChoice(q, false));
  } else if (q.type === 'MRQ') {
    el.appendChild(renderChoice(q, true));
  } else if (q.type === 'FIB' || q.type === 'SA' || q.type === 'SD') {
    el.appendChild(renderText(q));
  } else if (q.type === 'MATCH') {
    el.appendChild(renderMatch(q));
  } else if (q.type === 'ORDER') {
    el.appendChild(renderOrder(q));
  }

  // Actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  if (q.type === 'MCQ' || q.type === 'T/F' || q.type === 'MRQ') {
    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-primary';
    submitBtn.textContent = 'Submit';
    submitBtn.onclick = () => submitChoice(q, el);
    actions.appendChild(submitBtn);
  } else {
    const showBtn = document.createElement('button');
    showBtn.className = 'btn btn-primary';
    showBtn.textContent = 'Show Answer';
    showBtn.onclick = () => showTextAnswer(q, el);
    actions.appendChild(showBtn);
  }
  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn btn-reset';
  resetBtn.textContent = 'Reset';
  resetBtn.onclick = () => { state[q.id] = { selected: [], revealed: false, correct: null }; render(); };
  actions.appendChild(resetBtn);
  el.appendChild(actions);

  // Reveal area
  const reveal = document.createElement('div');
  reveal.className = 'reveal';
  reveal.dataset.for = q.id;
  el.appendChild(reveal);

  // Re-render current state
  if (state[q.id].revealed) {
    applyReveal(q, el);
  }

  return el;
}

function renderChoice(q, multi) {
  const box = document.createElement('div');
  box.className = 'options';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    if (state[q.id].selected.includes(i)) div.classList.add('selected');
    div.innerHTML = `<span class="option-letter">${letter(i)}.</span><span>${opt}</span>`;
    div.onclick = () => {
      if (state[q.id].revealed) return;
      const sel = state[q.id].selected;
      if (multi) {
        const idx = sel.indexOf(i);
        if (idx >= 0) sel.splice(idx, 1); else sel.push(i);
      } else {
        state[q.id].selected = [i];
      }
      render();
    };
    box.appendChild(div);
  });
  return box;
}

function renderText(q) {
  const ta = document.createElement('textarea');
  ta.className = 'text-answer';
  ta.placeholder = q.type === 'SD' ? 'Sketch your design...' : 'Type your answer...';
  if (state[q.id].userText) ta.value = state[q.id].userText;
  ta.oninput = () => { state[q.id].userText = ta.value; };
  if (state[q.id].revealed) ta.disabled = true;
  return ta;
}

function renderMatch(q) {
  const box = document.createElement('div');
  box.className = 'match-pairs';
  q.pairs.forEach(p => {
    const row = document.createElement('div');
    row.className = 'match-row';
    row.innerHTML = `<strong>${p.left.split('.')[0]}.</strong><span>${p.left.substring(p.left.indexOf('.')+1).trim()}</span>`;
    box.appendChild(row);
  });
  const hint = document.createElement('p');
  hint.style.fontSize = '0.85rem';
  hint.style.color = '#64748b';
  hint.style.marginTop = '8px';
  hint.textContent = 'Work out the matching in your head, then click Show Answer.';
  box.appendChild(hint);
  return box;
}

function renderOrder(q) {
  const box = document.createElement('div');
  box.className = 'order-list';
  q.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'order-row';
    row.innerHTML = `<span class="drag-handle">${letter(i)}.</span><span>${item}</span>`;
    box.appendChild(row);
  });
  const hint = document.createElement('p');
  hint.style.fontSize = '0.85rem';
  hint.style.color = '#64748b';
  hint.style.marginTop = '8px';
  hint.innerHTML = 'Shown <em>already</em> in correct order. Memorize the sequence, then click Show Answer to see an explanation.';
  box.appendChild(hint);
  return box;
}

function submitChoice(q, el) {
  const s = state[q.id];
  if (s.selected.length === 0) return;
  const selectedSet = new Set(s.selected);
  const correctSet = new Set(q.correct);
  const isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(x => correctSet.has(x));
  s.revealed = true;
  s.correct = isCorrect;
  render();
}

function showTextAnswer(q, el) {
  state[q.id].revealed = true;
  state[q.id].correct = null; // no auto-grading
  render();
}

function applyReveal(q, el) {
  // Mark options
  if (q.type === 'MCQ' || q.type === 'T/F' || q.type === 'MRQ') {
    const opts = el.querySelectorAll('.option');
    const selected = new Set(state[q.id].selected);
    const correct = new Set(q.correct);
    opts.forEach((o, i) => {
      o.classList.add('locked');
      if (correct.has(i) && selected.has(i)) o.classList.add('correct');
      else if (!correct.has(i) && selected.has(i)) o.classList.add('wrong');
      else if (correct.has(i) && !selected.has(i)) o.classList.add('missed');
    });
  }
  // Reveal box
  const reveal = el.querySelector('.reveal');
  reveal.classList.add('show');
  let title = 'Answer';
  let body = '';
  if (state[q.id].correct === true) {
    reveal.classList.add('correct-banner');
    title = 'Correct!';
  } else if (state[q.id].correct === false) {
    reveal.classList.add('wrong-banner');
    title = 'Not quite';
  }
  if (q.type === 'MCQ' || q.type === 'T/F' || q.type === 'MRQ') {
    const correctLetters = q.correct.map(i => letter(i)).join(', ');
    body = `<strong>Correct:</strong> ${correctLetters}<br>${q.explain || ''}`;
  } else if (q.type === 'MATCH') {
    body = '<strong>Answer:</strong><br>' + q.pairs.map(p => `${p.left} → ${p.right}`).join('<br>');
    if (q.explain) body += `<br><br>${q.explain}`;
  } else if (q.type === 'ORDER') {
    body = '<strong>Correct order:</strong><br>' + q.items.map((it, i) => `${i+1}. ${it}`).join('<br>');
    if (q.explain) body += `<br><br>${q.explain}`;
  } else {
    body = `<strong>Model answer:</strong><br>${q.answer || q.explain || ''}`;
  }
  reveal.innerHTML = `<div class="reveal-title ${state[q.id].correct === true ? 'correct' : state[q.id].correct === false ? 'wrong' : ''}">${title}</div><div class="reveal-body">${body}</div>`;
  updateCounts();
}

function updateCounts() {
  const answered = Object.values(state).filter(s => s.revealed).length;
  const correct = Object.values(state).filter(s => s.correct === true).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('correct-count').textContent = correct;
}

// ============= FILTERS =============
let chFilter = 'all', diffFilter = 'all';
function applyFilters() {
  document.querySelectorAll('.question').forEach(q => {
    const chOk = chFilter === 'all' || q.dataset.chapter === chFilter;
    const dOk = diffFilter === 'all' || q.dataset.diff === diffFilter;
    q.classList.toggle('hidden', !(chOk && dOk));
  });
  document.querySelectorAll('.chapter-heading').forEach(h => {
    const chOk = chFilter === 'all' || h.dataset.chapter === chFilter;
    h.style.display = chOk ? '' : 'none';
  });
}

document.querySelectorAll('[data-filter-chapter]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('[data-filter-chapter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chFilter = btn.dataset.filterChapter;
    applyFilters();
  };
});
document.querySelectorAll('[data-filter-diff]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('[data-filter-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    diffFilter = btn.dataset.filterDiff;
    applyFilters();
  };
});

// ============= INIT =============
render();
</script>
</body>
</html>
